services:
  - type: web
    name: godine-survey
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: SESSION_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /tmp
      - key: MONGODB_URI
        sync: false
